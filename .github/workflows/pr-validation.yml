name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-checks:
    name: PR Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert

      - name: Check for large files
        run: |
          large_files=$(find . -type f -size +1M -not -path "*/node_modules/*" -not -path "*/.git/*")
          if [ -n "$large_files" ]; then
            echo "Large files detected:"
            echo "$large_files"
            exit 1
          fi

      - name: Check for TODO/FIXME comments
        run: |
          todos=$(grep -r "TODO\|FIXME" --include="*.ts" --include="*.js" . || true)
          if [ -n "$todos" ]; then
            echo "## TODO/FIXME Comments Found" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$todos" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Run full validation
        run: npm run validate

      - name: Check code complexity
        run: |
          npx ts-node -e "
          const fs = require('fs');
          const path = require('path');
          const file = fs.readFileSync('main.ts', 'utf-8');
          const lines = file.split('\\n');
          console.log('Total lines:', lines.length);
          console.log('Non-empty lines:', lines.filter(l => l.trim()).length);
          " || echo "Complexity check skipped"

  test-coverage-diff:
    name: Coverage Diff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Store PR coverage
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            cp coverage/coverage-summary.json pr-coverage.json
          fi

      - name: Upload PR coverage
        uses: actions/upload-artifact@v4
        with:
          name: pr-coverage
          path: pr-coverage.json
          retention-days: 7

  build-size-check:
    name: Build Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Check build size
        run: |
          size=$(stat -c%s main.js 2>/dev/null || stat -f%z main.js)
          size_kb=$((size / 1024))
          echo "Build size: ${size_kb}KB"
          echo "## Build Size: ${size_kb}KB" >> $GITHUB_STEP_SUMMARY
          if [ $size_kb -gt 1000 ]; then
            echo "⚠️ Warning: Build size exceeds 1MB" >> $GITHUB_STEP_SUMMARY
          fi

  comment-pr:
    name: Comment PR with Results
    runs-on: ubuntu-latest
    needs: [pr-checks, test-coverage-diff, build-size-check]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Create PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const message = `
            ## PR Validation Results

            ✅ All validation checks completed

            - Linting: Passed
            - Type checking: Passed
            - Tests: Passed
            - Build: Successful

            See [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
